<div class="wrapper form-wrapper p-md-0">

    <div class="container p-0">
      <!-- // (•_•) // bradecrumb // // -->
      <PageHeader headerName="Advance formula" [showBreadcrumbs]="true" [breadcrumbs]="breadcrumbData"></PageHeader>
      <!-- // (•_•) // bradecrumb \\ \\ -->
    </div>
  </header>

      <section class="padding-top">
        <div class="subtitle-1 mb-20" translate>Fabrication Labour</div>
      </section>

      <div class="d-flex align-items-center justify-content-between mb-20">
        <div>
          <span class="subtitle-2">Conditions</span>
        </div>
        <div class="rates">
          <span class="subtitle-2">Rates</span>
        </div>
      </div>

                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </div>
              <div>
                <span class="body-1 text-uppercase if-else d-block custom-lozenge text-center">IF</span>
              </div>
              <div class="w-100">
                <app-select
                  ngClass="mb-0"
                  [options]="comparableOptions"
                  optionId="id"
                  optionValue="name"
                  formControlName="comparable"
                ></app-select>
              </div>
              <div class="w-100">
                <app-select ngClass="mb-0" [options]="comparatorOptions" optionId="id" optionValue="name"></app-select>
              </div>
              <div class="w-100">

              <div>
                <span class="body-1 text-uppercase">THEN</span>

            </div>
            <div>
